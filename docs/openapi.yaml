openapi: 3.0.3
info:
  title: 홈페이지 빌더 API
  version: 1.0.0
  description: |
    코드 없이 홈페이지를 만드는 멀티 사이트 빌더 플랫폼의 REST API 명세입니다.

    - **기본 URL**: `http://localhost:8000/api` (개발 환경)
    - **인증**: JWT Bearer Token (유효기간 24시간)
    - **데이터 형식**: JSON (utf-8)

    ## 응답 형식

    모든 API 응답은 다음 형식을 따릅니다:

    **성공 (200, 201)**:
    ```json
    {
      "success": true,
      "data": { /* 실제 데이터 */ },
      "message": "작업 완료"
    }
    ```

    **실패 (4xx, 5xx)**:
    ```json
    {
      "success": false,
      "error": {
        "code": "ERROR_CODE",
        "message": "에러 설명"
      }
    }
    ```

  contact:
    name: GitHub Issues
    url: https://github.com/kimyookwon/Hompage-builder/issues
  license:
    name: MIT

servers:
  - url: http://localhost:8000/api
    description: 개발 환경
  - url: https://your-domain.com/api
    description: 프로덕션 환경

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token for authentication

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: user@example.com
        name:
          type: string
          example: John Doe
        role:
          type: string
          enum: [admin, user]
          example: user
        avatar_url:
          type: string
          nullable: true
          example: https://example.com/avatar.jpg
        oauth_provider:
          type: string
          nullable: true
          enum: [google, kakao, naver]
        status:
          type: string
          enum: [active, inactive, blocked]
          example: active
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    LoginResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
          description: JWT access token (유효기간 24시간)
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    Board:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: 공지사항
        description:
          type: string
          nullable: true
          example: 사이트 공지사항입니다.
        slug:
          type: string
          example: notice
        type:
          type: string
          enum: [notice, general]
          example: notice
        visibility:
          type: string
          enum: [public, private]
          example: public
        posts_count:
          type: integer
          example: 15
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Post:
      type: object
      properties:
        id:
          type: integer
          example: 1
        board_id:
          type: integer
          example: 1
        author_id:
          type: integer
          example: 1
        title:
          type: string
          example: 첫 번째 게시글
        content:
          type: string
          example: 게시글 내용입니다.
        slug:
          type: string
          example: first-post
        is_notice:
          type: boolean
          example: false
        view_count:
          type: integer
          example: 42
        likes_count:
          type: integer
          example: 5
        comments_count:
          type: integer
          example: 3
        tags:
          type: array
          items:
            type: string
          example: [React, Next.js]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        id:
          type: integer
          example: 1
        post_id:
          type: integer
          example: 1
        author_id:
          type: integer
          example: 2
        content:
          type: string
          example: 좋은 글 감사합니다!
        parent_id:
          type: integer
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        type:
          type: string
          enum: [comment_reply, mention, system]
          example: comment_reply
        title:
          type: string
          example: 새 답글이 있습니다.
        message:
          type: string
          example: 회원님의 댓글에 새 답글이 달렸습니다.
        related_id:
          type: integer
          nullable: true
          example: 5
        is_read:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time

    Page:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: 홈 페이지
        slug:
          type: string
          example: home
        content:
          type: string
          description: HTML 콘텐츠
          example: <h1>환영합니다</h1>
        is_published:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SiteSettings:
      type: object
      properties:
        site_name:
          type: string
          example: 홈페이지 빌더
        site_description:
          type: string
          example: 코드 없이 만드는 홈페이지
        logo_url:
          type: string
          nullable: true
        primary_color:
          type: string
          example: "#3B82F6"
        gtm_code:
          type: string
          nullable: true
        updated_at:
          type: string
          format: date-time

    HealthCheck:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded, error]
          example: ok
        version:
          type: string
          example: 1.0.0
        timestamp:
          type: string
          format: date-time
        checks:
          type: object
          properties:
            database:
              type: object
              properties:
                status:
                  type: string
                  enum: [ok, error]
                latency_ms:
                  type: number
                version:
                  type: string
            disk:
              type: object
              properties:
                status:
                  type: string
                  enum: [ok, warn, critical]
                free_gb:
                  type: number
                total_gb:
                  type: number
                usage_percent:
                  type: integer
            memory:
              type: object
              properties:
                status:
                  type: string
                  enum: [ok]
                php_memory_mb:
                  type: number
                php_peak_mb:
                  type: number
                php_limit_mb:
                  type: integer
            upload_dir:
              type: object
              properties:
                status:
                  type: string
                  enum: [ok, warn]
                writable:
                  type: boolean

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: INVALID_CREDENTIALS
            message:
              type: string
              example: 이메일 또는 비밀번호가 올바르지 않습니다.
            details:
              type: object
              nullable: true

security:
  - bearerAuth: []

paths:
  # ─── 시스템 ──────────────────────────────────────────
  /health:
    get:
      tags:
        - System
      summary: 시스템 헬스체크
      description: DB, 디스크, 메모리, 업로드 디렉토리 상태 확인
      security: []
      responses:
        200:
          description: 시스템 정상
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/HealthCheck'
        503:
          description: 서버 장애

  # ─── 인증 ──────────────────────────────────────────
  /auth/register:
    post:
      tags:
        - Authentication
      summary: 회원가입
      description: 이메일 + 비밀번호로 새 계정 생성
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, password_confirm, name]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  minLength: 8
                  pattern: '^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,}$'
                  example: SecurePass123!
                  description: 영문, 숫자, 특수문자 포함 8자 이상
                password_confirm:
                  type: string
                  example: SecurePass123!
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                  example: John Doe
      responses:
        201:
          description: 회원가입 완료
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/LoginResponse'
        400:
          description: 입력값 검증 실패
        409:
          description: 이미 가입된 이메일

  /auth/login:
    post:
      tags:
        - Authentication
      summary: 로그인
      description: 이메일 + 비밀번호로 로그인
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        200:
          description: 로그인 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/LoginResponse'
        401:
          description: 이메일 또는 비밀번호 오류
        403:
          description: 차단된 사용자

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: 로그아웃
      responses:
        200:
          description: 로그아웃 완료

  /auth/me:
    get:
      tags:
        - Authentication
      summary: 현재 사용자 정보 조회
      responses:
        200:
          description: 사용자 정보
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'
        401:
          description: 토큰 만료 또는 유효하지 않음

  /auth/verify-email:
    get:
      tags:
        - Authentication
      summary: 이메일 인증
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
      security: []
      responses:
        200:
          description: 이메일 인증 완료
        400:
          description: 유효하지 않은 토큰

  /auth/forgot-password:
    post:
      tags:
        - Authentication
      summary: 비밀번호 재설정 요청
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        200:
          description: 재설정 링크 이메일 발송

  /auth/reset-password:
    post:
      tags:
        - Authentication
      summary: 비밀번호 재설정
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password, password_confirm]
              properties:
                token:
                  type: string
                password:
                  type: string
                password_confirm:
                  type: string
      responses:
        200:
          description: 비밀번호 변경 완료
        400:
          description: 유효하지 않은 토큰

  /auth/oauth/{provider}/redirect:
    get:
      tags:
        - Authentication
      summary: OAuth 인증 페이지로 이동
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum: [google, kakao, naver]
      security: []
      responses:
        302:
          description: OAuth 제공자 인증 페이지로 리다이렉트

  /auth/oauth/{provider}/callback:
    post:
      tags:
        - Authentication
      summary: OAuth 콜백 처리
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum: [google, kakao, naver]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        200:
          description: OAuth 로그인 완료
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    allOf:
                      - $ref: '#/components/schemas/LoginResponse'
                      - type: object
                        properties:
                          is_new_user:
                            type: boolean
        401:
          description: 유효하지 않은 authorization code

  /auth/2fa/setup:
    post:
      tags:
        - Authentication
      summary: 2FA (TOTP) 설정 시작
      responses:
        200:
          description: QR 코드 및 secret 반환
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      secret:
                        type: string
                      qr_code_url:
                        type: string

  /auth/2fa/confirm:
    post:
      tags:
        - Authentication
      summary: 2FA 설정 확인
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
      responses:
        200:
          description: 2FA 활성화 완료

  /auth/2fa:
    delete:
      tags:
        - Authentication
      summary: 2FA 비활성화
      responses:
        200:
          description: 2FA 비활성화 완료

  /auth/2fa/login:
    post:
      tags:
        - Authentication
      summary: 2FA 코드 검증 (로그인 시)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
      security: []
      responses:
        200:
          description: 로그인 완료
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/LoginResponse'

  # ─── 페이지 ──────────────────────────────────────────
  /pages:
    get:
      tags:
        - Pages
      summary: 페이지 목록 조회
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        200:
          description: 페이지 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Page'
                  pagination:
                    type: object

    post:
      tags:
        - Pages
      summary: 페이지 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, slug]
              properties:
                title:
                  type: string
                slug:
                  type: string
                content:
                  type: string
      responses:
        201:
          description: 페이지 생성 완료
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Page'
        409:
          description: 중복된 슬러그

  /pages/{id}:
    get:
      tags:
        - Pages
      summary: 페이지 상세 조회
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: 페이지 상세
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Page'
        404:
          description: 페이지 없음

    patch:
      tags:
        - Pages
      summary: 페이지 수정
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                slug:
                  type: string
                content:
                  type: string
      responses:
        200:
          description: 페이지 수정 완료
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Page'

    delete:
      tags:
        - Pages
      summary: 페이지 삭제
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: 페이지 삭제 완료

  /pages/{id}/publish:
    patch:
      tags:
        - Pages
      summary: 페이지 공개 상태 전환
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: 공개 상태 변경 완료
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Page'

  /pages/{id}/duplicate:
    post:
      tags:
        - Pages
      summary: 페이지 복제
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        201:
          description: 페이지 복제 완료
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Page'

  /pages/{id}/preview:
    get:
      tags:
        - Pages
      summary: 페이지 미리보기
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: 미리보기 HTML

  /public/pages/{slug}:
    get:
      tags:
        - Pages
      summary: 공개 페이지 렌더링
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      security: []
      responses:
        200:
          description: 렌더링된 페이지 HTML

  # ─── 페이지 섹션 ──────────────────────────────────────
  /pages/{id}/sections:
    get:
      tags:
        - Page Sections
      summary: 페이지 섹션 목록 조회
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: 섹션 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object

    post:
      tags:
        - Page Sections
      summary: 섹션 생성
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [header, banner, container, footer]
                content:
                  type: object
      responses:
        201:
          description: 섹션 생성 완료

  /pages/{id}/sections/reorder:
    patch:
      tags:
        - Page Sections
      summary: 섹션 순서 변경
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sections:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                      order:
                        type: integer
      responses:
        200:
          description: 순서 변경 완료

  /sections/{id}:
    patch:
      tags:
        - Page Sections
      summary: 섹션 수정
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: object
      responses:
        200:
          description: 섹션 수정 완료

    delete:
      tags:
        - Page Sections
      summary: 섹션 삭제
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: 섹션 삭제 완료

  # ─── 미디어 ──────────────────────────────────────────
  /media:
    get:
      tags:
        - Media
      summary: 미디어 목록 조회
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        200:
