services:
  # PHP 8.2 FPM 백엔드
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homepage_php
    restart: always
    volumes:
      - uploads:/var/www/backend/public/uploads
    env_file:
      - .env.prod
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  # Nginx 웹서버 (PHP + Next.js 프록시)
  nginx:
    image: nginx:1.25-alpine
    container_name: homepage_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - uploads:/var/www/backend/public/uploads:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - php
      - admin
    networks:
      - app-network

  # Next.js 어드민 앱
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: homepage_admin
    restart: always
    env_file:
      - admin/.env.prod
    depends_on:
      - php
    networks:
      - app-network

  # MySQL 8.0 데이터베이스
  mysql:
    image: mysql:8.0
    container_name: homepage_mysql
    restart: always
    env_file:
      - .env.prod
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Certbot (HTTPS 인증서 자동 갱신)
  certbot:
    image: certbot/certbot:latest
    container_name: homepage_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  mysql_data:
  uploads:
  certbot_www:
  certbot_conf:

networks:
  app-network:
    driver: bridge
