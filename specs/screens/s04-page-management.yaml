version: "2.0"
screen_id: S04
name: 페이지 관리
generated: "2026-03-27"

metadata:
  route: /admin/pages
  type: admin
  layout: sidebar-main
  auth_required: true
  role_required: admin
  description: 페이지 CRUD 및 발행 관리

data_requirements:
  pages:
    resource: pages
    pagination:
      per_page: 20
      default_page: 1
    order_by: created_at desc
    fields: [id, title, slug, is_published, sort_order, created_at]
    filters:
      - search: title, slug
      - published_status: is_published

components:
  - name: AdminNav
    type: sidebar
    reuse: S03.AdminNav

  - name: PageHeader
    type: header
    description: 화면 헤더
    title: "페이지 관리"
    actions:
      - create_button: "새 페이지 + CreatePageModal"

  - name: SearchBar
    type: search_input
    description: 페이지 검색
    placeholder: "페이지 제목 또는 슬러그로 검색"
    search_fields: [title, slug]
    debounce: 300ms

  - name: PageListTable
    type: table
    description: 페이지 목록 테이블
    columns:
      - title: { label: "제목", width: "25%" }
      - slug: { label: "슬러그", width: "20%", font: "mono" }
      - is_published: { label: "발행 상태", width: "15%", type: "toggle" }
      - section_count: { label: "섹션 수", width: "10%", align: "center" }
      - created_at: { label: "생성일", width: "15%", format: "yyyy-MM-dd" }
      - actions: { label: "작업", width: "15%" }
    row_data_computed:
      - section_count: "SELECT COUNT(*) FROM page_sections WHERE page_id = ?"
    row_actions:
      - edit_button: "편집 → navigateTo /admin/pages/{page_id}/edit"
      - delete_button: "삭제 → ConfirmDeleteModal"
    row_double_click: navigate to editor

  - name: CreatePageModal
    type: modal
    description: 새 페이지 생성 모달
    form_fields:
      - title: { type: text, validation: required, max: 100 }
      - slug: { type: text, validation: required, unique, max: 100 }
    actions:
      - cancel_button: "취소"
      - submit_button: "생성"
    on_success: close modal, refresh table, show toast

  - name: ConfirmDeleteModal
    type: modal
    description: 페이지 삭제 확인
    message: "이 페이지와 모든 섹션이 삭제됩니다. 계속하시겠습니까?"
    warning_text: "이 작업은 되돌릴 수 없습니다"
    actions:
      - cancel_button: "취소"
      - delete_button: "삭제 (red)"
    on_confirm: DELETE /api/pages/{page_id}

  - name: Pagination
    type: pagination
    description: 페이지네이션
    current_page: pages.meta.current_page
    total_pages: pages.meta.total_pages
    per_page_options: [10, 20, 50]

  - name: Toast
    type: notification
    display: bottom-right
    auto_close: 4s

events:
  createPage:
    trigger: "새 페이지" 버튼 클릭
    action: show CreatePageModal

  submitCreatePage:
    trigger: CreatePageModal submit
    action: POST /api/pages
    payload: { title, slug }
    success_action: close modal, fetch pages, show success toast
    error_action: show error in modal

  togglePublish:
    trigger: is_published toggle click
    action: PATCH /api/pages/{page_id}
    payload: { is_published: boolean }
    optimistic_update: true
    error_recovery: revert to previous state

  editPage:
    trigger: edit button click
    action: navigate to /admin/pages/{page_id}/edit

  deletePage:
    trigger: delete button click
    action: show ConfirmDeleteModal

  confirmDelete:
    trigger: ConfirmDeleteModal confirm
    action: DELETE /api/pages/{page_id}
    success_action: close modal, refresh table, show success toast
    error_action: show error toast

  searchPages:
    trigger: search input change
    action: filter pages by title/slug
    debounce: 300ms

  changePage:
    trigger: pagination click
    action: fetch pages for page number

tests:
  - name: 페이지 목록 조회
    given: /admin/pages 접속
    when: 페이지 로드
    then: 페이지 목록 20개 표시 (pagination)

  - name: 발행 토글 즉시 반영
    given: 페이지 목록 표시
    when: is_published 토글 클릭
    then: API 호출 후 즉시 UI 업데이트, 실패 시 롤백

  - name: 새 페이지 생성
    given: "새 페이지" 버튼 클릭
    when: 모달에서 title/slug 입력 후 생성 클릭
    then: 페이지 생성, 목록에 추가, 성공 토스트

  - name: 페이지 삭제 확인
    given: 페이지 삭제 버튼 클릭
    when: ConfirmDeleteModal 표시
    then: 경고 메시지 표시, 확인 전까지 삭제 안 함

  - name: 페이지 검색
    given: 검색어 입력
    when: 300ms 후 검색 실행
    then: 제목/슬러그로 필터링

  - name: slug 유니크 검증
    given: CreatePageModal에서 기존 slug 입력
    when: 생성 버튼 클릭
    then: 에러 "이미 사용 중인 슬러그입니다" 표시

performance:
  table_load_time: 1.5s
  toggle_response_time: 300ms
  search_debounce: 300ms
