server {
  listen 80;
  server_name localhost;
  root /var/www/backend/public;
  index index.php;

  # 최대 업로드 크기
  client_max_body_size 20M;

  # 정적 파일 (CSS, JS, 이미지)
  location ~* \.(css|js|png|jpg|jpeg|webp|gif|svg|ico|woff|woff2|ttf)$ {
    expires 7d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Public API 요청 (JSON) → index.php (CORS 포함)
  location /public/ {
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    if ($request_method = OPTIONS) {
      return 204;
    }

    try_files $uri /index.php?$query_string;
  }

  # API 요청 → index.php (CORS 포함)
  location /api/ {
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    if ($request_method = OPTIONS) {
      return 204;
    }

    try_files $uri /index.php?$query_string;
  }

  # 업로드 파일 직접 서빙
  location /uploads/ {
    try_files $uri =404;
  }

  # 공개 게시판 → boards/index.php
  location /boards/ {
    try_files $uri /boards/index.php?$query_string;
  }

  # 공개 홈페이지 → render.php (슬러그 기반 렌더러)
  location / {
    try_files $uri /render.php?$query_string;
  }

  # PHP 처리
  location ~ \.php$ {
    fastcgi_pass php:9000;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    include fastcgi_params;
    fastcgi_read_timeout 300;
  }

  # 숨김 파일 접근 차단
  location ~ /\. {
    deny all;
  }

  # 로그 설정
  access_log /var/log/nginx/homepage_access.log;
  error_log /var/log/nginx/homepage_error.log;
}
