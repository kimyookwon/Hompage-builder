server {
  listen 80;
  server_name localhost;
  root /var/www/backend/public;
  index index.php;

  # 최대 업로드 크기
  client_max_body_size 20M;

  # ── 보안 헤더 ────────────────────────────────────────────
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  # Nginx 버전 노출 방지
  server_tokens off;

  # ── 정적 파일 ────────────────────────────────────────────
  location ~* \.(css|js|png|jpg|jpeg|webp|gif|svg|ico|woff|woff2|ttf)$ {
    expires 7d;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  # ── Public API (JSON, 공개 CORS) ──────────────────────────
  location /public/ {
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    if ($request_method = OPTIONS) {
      return 204;
    }

    try_files $uri /index.php?$query_string;
  }

  # ── REST API (CORS — 환경변수로 오리진 제한 가능) ───────────
  location /api/ {
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Vary "Origin" always;

    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin $http_origin always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
      add_header Access-Control-Max-Age 86400;
      return 204;
    }

    try_files $uri /index.php?$query_string;
  }

  # ── 업로드 파일 직접 서빙 ───────────────────────────────────
  location /uploads/ {
    expires 30d;
    add_header Cache-Control "public";
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  # ── 공개 게시판 ──────────────────────────────────────────
  location /boards/ {
    try_files $uri /boards/index.php?$query_string;
  }

  # ── 공개 홈페이지 (슬러그 기반 렌더러) ──────────────────────
  location / {
    try_files $uri /render.php?$query_string;
  }

  # ── PHP 처리 ────────────────────────────────────────────
  location ~ \.php$ {
    fastcgi_pass php:9000;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    include fastcgi_params;
    fastcgi_read_timeout 300;
    # PHP 버전 노출 방지
    fastcgi_hide_header X-Powered-By;
  }

  # ── 숨김 파일 및 민감 경로 차단 ──────────────────────────────
  location ~ /\. {
    deny all;
  }

  location ~* \.(env|log|sql|sh|bak|conf)$ {
    deny all;
    return 404;
  }

  # ── 로그 ────────────────────────────────────────────────
  access_log /var/log/nginx/homepage_access.log;
  error_log /var/log/nginx/homepage_error.log;
}
