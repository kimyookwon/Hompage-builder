name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────
  # PHP 백엔드 테스트
  # ──────────────────────────────────────
  php-test:
    name: PHP 테스트
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: homepage_db
          MYSQL_USER: homepage_user
          MYSQL_PASSWORD: homepage_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: PHP 설정
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, json

      - name: Composer 의존성 설치
        working-directory: backend
        run: composer install --no-interaction

      - name: 환경 변수 설정
        working-directory: backend
        run: |
          cp .env.example .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PORT=.*/DB_PORT=3306/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=homepage_db/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=homepage_user/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=homepage_pass/' .env
          sed -i 's/JWT_SECRET=.*/JWT_SECRET=ci-test-secret-key-minimum-32-characters/' .env

      - name: DB 마이그레이션
        working-directory: backend
        run: php database/migrate.php

      - name: PHP 테스트 실행
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: homepage_db
          DB_USERNAME: homepage_user
          DB_PASSWORD: homepage_pass
        run: php vendor/bin/phpunit tests/ --testdox

  # ──────────────────────────────────────
  # Next.js TypeScript 빌드 검사
  # ──────────────────────────────────────
  nextjs-build:
    name: Next.js 빌드 검사
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: 의존성 설치
        working-directory: admin
        run: npm ci

      - name: TypeScript 타입 검사
        working-directory: admin
        run: npx tsc --noEmit

      - name: Next.js 빌드
        working-directory: admin
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
        run: npm run build

  # ──────────────────────────────────────
  # Playwright E2E 테스트
  # ──────────────────────────────────────
  e2e-test:
    name: Playwright E2E 테스트
    runs-on: ubuntu-latest
    needs: nextjs-build

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: homepage_db
          MYSQL_USER: homepage_user
          MYSQL_PASSWORD: homepage_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: PHP 설정
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, json

      - name: PHP 의존성 설치
        working-directory: backend
        run: composer install --no-interaction --no-dev

      - name: PHP 환경 변수 설정
        working-directory: backend
        run: |
          cp .env.example .env
          sed -i 's/APP_DEBUG=.*/APP_DEBUG=true/' .env
          sed -i 's|APP_URL=.*|APP_URL=http://localhost:8000|' .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PORT=.*/DB_PORT=3306/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=homepage_db/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=homepage_user/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=homepage_pass/' .env
          sed -i 's/JWT_SECRET=.*/JWT_SECRET=ci-test-secret-key-minimum-32-characters/' .env
          echo 'ALLOWED_ORIGINS=http://localhost:3000' >> .env

      - name: 업로드 디렉토리 생성
        run: mkdir -p backend/public/uploads/{images,attachments} && chmod -R 755 backend/public/uploads

      - name: DB 마이그레이션
        working-directory: backend
        run: php database/migrate.php

      - name: PHP 내장 서버 실행 및 대기
        working-directory: backend/public
        run: |
          php -S 0.0.0.0:8000 index.php &
          echo $! > /tmp/php-server.pid
          # 서버 준비 대기 (최대 15초)
          for i in $(seq 1 15); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/site-settings | grep -q "200\|401"; then
              echo "PHP 서버 준비 완료"
              break
            fi
            echo "대기 중... ($i)"
            sleep 1
          done

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: 의존성 설치
        working-directory: admin
        run: npm ci

      - name: Next.js 환경 변수 설정
        working-directory: admin
        run: |
          echo "NEXT_PUBLIC_API_URL=http://localhost:8000/api" > .env.local
          echo "NEXT_PUBLIC_SITE_URL=http://localhost:3000" >> .env.local

      - name: Playwright 브라우저 설치
        working-directory: admin
        run: npx playwright install --with-deps chromium

      - name: Playwright 테스트 실행
        working-directory: admin
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
          CI: true
        run: npx playwright test --reporter=list

      - name: 테스트 결과 업로드 (실패 시)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: admin/playwright-report/
          retention-days: 7
