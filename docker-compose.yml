services:
  # PHP 8.2 FPM 백엔드
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homepage_php
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/backend
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  # Nginx 웹서버
  nginx:
    image: nginx:1.25-alpine
    container_name: homepage_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/backend
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app-network

  # MySQL 8.0 데이터베이스
  mysql:
    image: mysql:8.0
    container_name: homepage_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    env_file:
      - .env.docker
    environment:
      MYSQL_ROOT_PASSWORD: homepage_password
      MYSQL_DATABASE: homepage_builder
      MYSQL_USER: homepage_user
      MYSQL_PASSWORD: homepage_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/migrations:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
