[www]
user = www-data
group = www-data

; TCP 소켓 (Nginx와 통신)
listen = 0.0.0.0:9000

; 프로세스 관리 방식: dynamic (트래픽에 따라 자동 조절)
pm = dynamic

; 최대 자식 프로세스 수 (메모리에 맞게 조절: 총 메모리 / 프로세스당 ~30MB)
pm.max_children = 20

; 시작 시 생성할 프로세스 수
pm.start_servers = 5

; 유휴 프로세스 최소/최대
pm.min_spare_servers = 3
pm.max_spare_servers = 10

; 요청 처리 후 프로세스 재시작 주기 (메모리 누수 방지)
pm.max_requests = 500

; 슬로 로그 기록 임계값 (초)
request_slowlog_timeout = 5s
slowlog = /var/log/php-fpm/slow.log

; 요청 처리 최대 시간 (초)
request_terminate_timeout = 60

; 헬스체크 — ping 경로 설정
ping.path = /ping
ping.response = pong

; 상태 페이지
pm.status_path = /status
